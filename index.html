<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Ghost - 官方网站</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .team-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .member-card { background: #111; border: 1px solid #333; border-radius: 10px; overflow: hidden; padding-bottom: 10px; }
        /* 图片容器，增加了一个深色占位，防止加载慢时全白 */
        .photo-box { 
            width: 100%; 
            height: 150px; 
            background-color: #222; 
            background-size: cover; 
            background-position: center; 
        }
        h2 { color: #00f2ff; font-size: 1.2rem; margin: 10px 0 5px; }
        p { font-size: 0.8rem; color: #aaa; margin: 2px 0; }
    </style>
</head>
<body>

    <h1 style="color: #ff0055; text-shadow: 0 0 10px #ff0055;">MIDNIGHT GHOST</h1>
    <p>Johor Bahru Car Enthusiast Team</p>

    <div class="team-grid" id="teamGrid"></div>

    <script>
        // 这是你要找的数据部分，我已经帮你把路径加了 "./" 确保更稳定
        const teamData = [
            { name: "果冻 (KOKTONG)", car: "Mazda RX-8 SE3P", img: "./car_koktong.jpg" },
            { name: "伟杰 (WEIJIE)", car: "Toyota 86 ZN6", img: "./car_weijie.jpg" },
            { name: "冠乐 (GUANLE)", car: "Nissan Silvia S13", img: "./car_guanle.jpg" },
            { name: "子典 (ZIDIAN)", car: "Honda NSX (NA1)", img: "./car_zidian.jpg" },
            { name: "俊豪 (JUNHAO)", car: "Honda Civic Type R (FL5)", img: "./car_junhao.jpg" },
            { name: "勇杰 (YONGJIE)", car: "Honda Civic Type R (FL5)", img: "./car_yongjie.jpg" }
        ];

        const grid = document.getElementById('teamGrid');
        grid.innerHTML = teamData.map(m => `
            <div class="member-card">
                <div class="photo-box" style="background-image: url('${m.img}')"></div>
                <h2>${m.name}</h2>
                <p>${m.car}</p>
            </div>
        `).join('');
    </script>
</body>
</html>
