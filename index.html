<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Ghost | Tech Spec</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; }

        body {
            /* 纯粹的午夜颜色 (深邃蓝色渐变) */
            background: radial-gradient(circle at top, #001a2c 0%, #00050a 100%);
            background-color: #000b14;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 日本狐狸装饰 - 保持低调透明度 */
        .kitsune-decor {
            position: fixed; top: 50%; transform: translateY(-50%);
            width: 30vw; height: 30vw; fill: #00d4ff; opacity: 0.05; z-index: -1;
        }
        .kitsune-left { left: -5vw; }
        .kitsune-right { right: -5vw; transform: translateY(-50%) scaleX(-1); }

        /* 鬼火粒子 - 调小一点，像冷光 */
        .onibi {
            position: fixed; width: 10px; height: 10px; background: #00d4ff;
            border-radius: 50%; pointer-events: none; z-index: -1;
            box-shadow: 0 0 15px #00d4ff; opacity: 0.6;
            animation: onibiFloat 8s infinite linear;
        }
        @keyframes onibiFloat {
            0% { transform: translateY(100vh); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        /* 语言切换 */
        .lang-switcher { position: fixed; top: 25px; right: 20px; z-index: 100; display: flex; gap: 10px; }
        .lang-btn {
            padding: 10px 18px; background: rgba(0, 85, 255, 0.1); border: 2px solid #0044aa;
            color: #fff; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s;
        }
        .lang-btn.active { background: #00d4ff; border-color: #fff; color: #000; box-shadow: 0 0 15px #00d4ff; }

        /* 标题 */
        .header { text-align: center; margin: 80px 0 40px 0; }
        .header h1 { font-size: 3.5rem; letter-spacing: 12px; font-weight: 900; text-shadow: 0 0 20px #00d4ff; }

        /* 列表 */
        .team-list { width: 95%; max-width: 750px; z-index: 10; margin-bottom: 80px; }
        
        .member-item {
            background: rgba(0, 30, 60, 0.4); border: 2px solid #002244;
            border-radius: 15px; margin-bottom: 15px; cursor: pointer; transition: 0.3s;
        }
        .member-item:hover { border-color: #00d4ff; background: rgba(0, 40, 80, 0.6); }

        .member-header { padding: 30px; display: flex; justify-content: space-between; align-items: center; }
        .name-main { font-size: 2.2rem; font-weight: 900; }
        .cn-sub { font-size: 1.2rem; color: #00d4ff; display: block; }

        /* 参数面板样式 */
        .member-details {
            max-height: 0; overflow: hidden; transition: 0.5s ease;
            padding: 0 30px; background: rgba(0,0,0,0.3);
        }
        .member-item.active .member-details { max-height: 500px; padding: 30px; border-top: 1px solid #003366; }

        .spec-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            font-family: 'Courier New', Courier, monospace; /* 机械质感字体 */
        }
        .spec-item { border-left: 3px solid #00d4ff; padding-left: 15px; margin-bottom: 10px; }
        .spec-label { font-size: 0.9rem; color: #0088ff; text-transform: uppercase; display: block; }
        .spec-value { font-size: 1.3rem; color: #fff; font-weight: bold; }

        footer { padding: 50px; color: #003366; font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>

    <div class="onibi" style="left: 15vw; animation-delay: 0s;"></div>
    <div class="onibi" style="left: 45vw; animation-delay: 3s;"></div>
    <div class="onibi" style="left: 85vw; animation-delay: 5s;"></div>

    <svg class="kitsune-decor kitsune-left" viewBox="0 0 512 512"><path d="M416 32h-320a64.07 64.07 0 0 0-64 64v320a64.07 64.07 0 0 0 64 64h320a64.07 64.07 0 0 0 64-64v-320a64.07 64.07 0 0 0-64-64zm-192 128a32 32 0 1 1 32 32 32 32 0 0 1-32-32zm64 224a96.11 96.11 0 0 1-96-96h192a96.11 96.11 0 0 1-96 96zm96-192a32 32 0 1 1 32-32 32 32 0 0 1-32 32z"></path></svg>
    <svg class="kitsune-decor kitsune-right" viewBox="0 0 512 512"><path d="M416 32h-320a64.07 64.07 0 0 0-64 64v320a64.07 64.07 0 0 0 64 64h320a64.07 64.07 0 0 0 64-64v-320a64.07 64.07 0 0 0-64-64zm-192 128a32 32 0 1 1 32 32 32 32 0 0 1-32-32zm64 224a96.11 96.11 0 0 1-96-96h192a96.11 96.11 0 0 1-96 96zm96-192a32 32 0 1 1 32-32 32 32 0 0 1-32 32z"></path></svg>

    <div class="lang-switcher">
        <button class="lang-btn active" onclick="changeLang('cn', this)">CN</button>
        <button class="lang-btn" onclick="changeLang('en', this)">EN</button>
    </div>

    <div class="header">
        <h1>MIDNIGHT GHOST</h1>
    </div>

    <div class="team-list" id="teamList"></div>

    <footer>PERFORMANCE SPECIFICATIONS · 2026</footer>

    <script>
        const teamData = [
            { enName: "KOKTONG", cnName: "果冻", car: "Mazda RX-8 SE3P", 
              spec: { engine: "13B-MSP Renesis", power: "232 HP", drive: "FR (Rear-Wheel Drive)", top: "235 km/h" } },
            { enName: "WEIJIE", cnName: "伟杰", car: "Toyota 86 ZN6", 
              spec: { engine: "FA20 Boxer", power: "200 HP", drive: "FR (Rear-Wheel Drive)", top: "226 km/h" } },
            { enName: "GUANLE", cnName: "冠乐", car: "Silvia S13", 
              spec: { engine: "SR20DET Turbo", power: "250 HP", drive: "FR (Drift Setup)", top: "240 km/h" } },
            { enName: "ZIDIAN", cnName: "子典", car: "Gallardo LP560", 
              spec: { engine: "5.2L V10", power: "552 HP", drive: "AWD", top: "325 km/h" } },
            { enName: "JUNHAO", cnName: "俊豪", car: "Civic Type R FL5", 
              spec: { engine: "K20C1 Turbo", power: "315 HP", drive: "FF", top: "275 km/h" } },
            { enName: "YONGJIE", cnName: "勇杰", car: "Civic Type R FL5", 
              spec: { engine: "K20C1 Turbo", power: "315 HP", drive: "FF", top: "275 km/h" } }
        ];

        let currentLang = 'cn';

        function renderTeam() {
            const list = document.getElementById('teamList');
            list.innerHTML = teamData.map(m => `
                <div class="member-item" onclick="this.classList.toggle('active')">
                    <div class="member-header">
                        <div class="name-main">
                            ${m.enName}
                            <span class="cn-sub">${m.cnName}</span>
                        </div>
                        <div style="text-align: right; color: #00d4ff;">
                            <small>${currentLang === 'cn' ? '座驾' : 'VEHICLE'}</small><br>
                            ${m.car}
                        </div>
                    </div>
                    <div class="member-details">
                        <div class="spec-grid">
                            <div class="spec-item">
                                <span class="spec-label">${currentLang === 'cn' ? '引擎型号' : 'ENGINE'}</span>
                                <span class="spec-value">${m.spec.engine}</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-label">${currentLang === 'cn' ? '最大功率' : 'POWER'}</span>
                                <span class="spec-value">${m.spec.power}</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-label">${currentLang === 'cn' ? '驱动布局' : 'DRIVE'}</span>
                                <span class="spec-value">${m.spec.drive}</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-label">${currentLang === 'cn' ? '最高时速' : 'TOP SPEED'}</span>
                                <span class="spec-value">${m.spec.top}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function changeLang(lang, btn) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTeam();
        }

        renderTeam();
    </script>
</body>
</html>
