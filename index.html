<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Ghost | JB Car Team</title>
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff0055; }
        body { background: #00050a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        /* 顶部标题样式 */
        .header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--neon-blue); margin-bottom: 30px; }
        .header h1 { font-style: italic; letter-spacing: 5px; margin: 0; text-shadow: 0 0 15px var(--neon-blue); }

        /* 成员网格 */
        .team-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        
        /* 蓝色科技感卡片 */
        .card { 
            background: rgba(0, 20, 40, 0.8); 
            border: 1px solid var(--neon-blue); 
            border-radius: 15px; 
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
            transition: 0.3s;
        }

        /* 图片容器 */
        .photo { 
            width: 100%; 
            height: 120px; 
            background-size: cover; 
            background-position: center;
            border-bottom: 1px solid var(--neon-blue);
        }

        .info { padding: 10px; text-align: center; }
        .info h2 { font-size: 1rem; margin: 5px 0; color: var(--neon-blue); }
        .info p { font-size: 0.7rem; color: #ccc; margin: 0; }
        
        /* 底部装饰 */
        .footer { margin-top: 40px; font-size: 0.6rem; color: #444; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <h1>MIDNIGHT GHOST</h1>
    <p style="font-size: 0.8rem; color: var(--neon-pink);">EST. 2026 / JOHOR BAHRU</p>
</div>

<div class="team-grid" id="grid"></div>

<div class="footer">© 2026 Midnight Ghost Team. Designed for the Streets.</div>

<script>
    const team = [
        { name: "果冻 (KOKTONG)", car: "Mazda RX-8 SE3P", img: "car_koktong.jpg" },
        { name: "伟杰 (WEIJIE)", car: "Toyota 86 ZN6", img: "car_weijie.jpg" },
        { name: "冠乐 (GUANLE)", car: "Nissan Silvia S13", img: "car_guanle.jpg" },
        { name: "子典 (ZIDIAN)", car: "Honda NSX (NA1)", img: "car_zidian.jpg" },
        { name: "俊豪 (JUNHAO)", car: "Honda Civic Type R (FL5)", img: "car_junhao.jpg" },
        { name: "勇杰 (YONGJIE)", car: "Honda Civic Type R (FL5)", img: "car_yongjie.jpg" }
    ];

    const grid = document.getElementById('grid');
    grid.innerHTML = team.map(m => `
        <div class="card">
            <div class="photo" style="background-image: url('${m.img}')"></div>
            <div class="info">
                <h2>${m.name}</h2>
                <p>${m.car}</p>
            </div>
        </div>
    `).join('');
</script>

</body>
</html>
