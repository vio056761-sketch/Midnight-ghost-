<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Ghost | Official Site</title>
    <style>
        :root { 
            --neon-blue: #00f2ff; 
            --neon-pink: #ff0055; 
            --dark-bg: #000a12;
        }

        body { 
            background: var(--dark-bg); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 顶部标题自适应 */
        .header { 
            text-align: center; 
            padding: 30px 0; 
            width: 100%;
            max-width: 1200px;
            border-bottom: 2px solid var(--neon-blue);
            margin-bottom: 40px;
            position: relative;
        }

        .header h1 { 
            font-size: 2.5rem;
            font-style: italic; 
            letter-spacing: 8px; 
            margin: 0; 
            text-shadow: 0 0 20px var(--neon-blue); 
            text-transform: uppercase;
        }

        /* 核心：自动响应式网格布局 */
        .team-grid { 
            display: grid; 
            width: 100%;
            max-width: 1200px;
            /* 手机默认2列，电脑端自动增加列数 */
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
        }

        /* 电脑端 (屏幕宽度大于 768px) 自动变 3 列 */
        @media (min-width: 768px) {
            .team-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 30px;
            }
            .header h1 { font-size: 4rem; }
        }

        /* 蓝色科技感卡片 */
        .card { 
            background: rgba(0, 30, 60, 0.4); 
            border: 1px solid var(--neon-blue); 
            border-radius: 12px; 
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
        }

        /* 电脑端鼠标滑过效果 */
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
            border-color: var(--neon-pink);
        }

        /* 照片容器 */
        .photo-wrapper {
            width: 100%;
            padding-top: 65%; /* 保持图片比例 */
            position: relative;
            background: #111;
        }

        .photo { 
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; 
            background-position: center;
            transition: 0.5s;
        }

        .info { 
            padding: 15px; 
            text-align: center; 
            background: linear-gradient(to top, #001a30, transparent);
        }

        .info h2 { font-size: 1.1rem; margin: 5px 0; color: var(--neon-blue); text-shadow: 0 0 5px var(--neon-blue); }
        .info p { font-size: 0.8rem; color: #00fa9a; font-weight: bold; margin: 0; letter-spacing: 1px; }

        .footer { 
            margin-top: 60px; 
            padding: 20px;
            font-size: 0.7rem; 
            color: #444; 
            text-align: center;
            border-top: 1px solid #111;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>MIDNIGHT GHOST</h1>
    <p style="font-size: 0.9rem; color: var(--neon-pink); letter-spacing: 3px;">STREET RACING TEAM / JOHOR BAHRU</p>
</div>

<div class="team-grid" id="grid"></div>

<div class="footer">
    MIDNIGHT GHOST LEADER: KOKTONG<br>
    © 2026 POWERED BY GITHUB PAGES
</div>

<script>
    const team = [
        { name: "果冻 (KOKTONG)", car: "MAZDA RX-8 SE3P", img: "car_koktong.jpg" },
        { name: "伟杰 (WEIJIE)", car: "TOYOTA 86 ZN6", img: "car_weijie.jpg" },
        { name: "冠乐 (GUANLE)", car: "NISSAN SILVIA S13", img: "car_guanle.jpg" },
        { name: "子典 (ZIDIAN)", car: "HONDA NSX (NA1)", img: "car_zidian.jpg" },
        { name: "俊豪 (JUNHAO)", car: "CIVIC TYPE R FL5", img: "car_junhao.jpg" },
        { name: "勇杰 (YONGJIE)", car: "CIVIC TYPE R FL5", img: "car_yongjie.jpg" }
    ];

    const grid = document.getElementById('grid');
    grid.innerHTML = team.map(m => `
        <div class="card">
            <div class="photo-wrapper">
                <div class="photo" style="background-image: url('${m.img}')"></div>
            </div>
            <div class="info">
                <h2>${m.name}</h2>
                <p>${m.car}</p>
            </div>
        </div>
    `).join('');
</script>

</body>
</html>
